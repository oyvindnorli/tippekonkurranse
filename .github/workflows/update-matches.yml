name: Update Matches and Odds

on:
  schedule:
    # Run every 5 minutes (~576 API calls/day, well within 7500 pro limit)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  update-matches:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run populate_matches.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python populate_matches.py

      - name: Run populate_vm2026.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python populate_vm2026.py

      - name: Run update_scores.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python update_scores.py

      - name: Log completion
        run: |
          echo "✅ Matches and odds updated successfully at $(date)"
