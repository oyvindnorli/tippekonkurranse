<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VM 2026 Tippekonkurranse</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vm2026.css?v=7">
</head>
<body>

    <!-- HEADER -->
    <header class="vm-header">
        <div class="vm-header-inner">
            <div class="vm-brand">
                <span class="vm-trophy">🏆</span>
                <div>
                    <div class="vm-brand-title">VM 2026 Tippekonkurranse</div>
                    <div class="vm-brand-sub">FIFA World Cup · USA · Canada · Mexico</div>
                </div>
            </div>
            <div class="vm-header-right">
                <span id="vmUsername" class="vm-username" style="display:none"></span>
                <button id="vmLoginBtn" class="vm-btn vm-btn-outline" onclick="handleGoogleSignIn()">
                    Logg inn
                </button>
                <button id="vmLogoutBtn" class="vm-btn vm-btn-outline" style="display:none" onclick="handleSignOut()">
                    Logg ut
                </button>
            </div>
        </div>
    </header>

    <!-- TABS -->
    <div style="background:#fff;border-bottom:1px solid #e5e7eb;">
        <div class="vm-tabs">
            <button class="vm-tab active" data-tab="matches" onclick="showTab('matches')">⚽ Kamper</button>
            <button class="vm-tab" data-tab="leaderboard" onclick="showTab('leaderboard')">🏆 Ledertabell</button>
        </div>
    </div>

    <!-- MATCHES TAB -->
    <div id="tab-matches" class="vm-tab-content">
        <div class="vm-content">

            <!-- Countdown banner -->
            <div class="vm-banner">
                <div class="vm-banner-icon">🌍</div>
                <div style="flex:1">
                    <div class="vm-banner-title">Nedtelling til VM 2026</div>
                    <div class="vm-banner-sub">11. juni – 19. juli 2026</div>
                    <div id="vm-countdown" class="vm-countdown" style="margin-top:10px"></div>
                </div>
            </div>

            <!-- Matches list -->
            <div id="vm-matches-content">
                <div class="vm-loading">
                    <div class="vm-spinner"></div>
                    <div>Laster kamper...</div>
                </div>
            </div>

        </div>
    </div>

    <!-- LEADERBOARD TAB -->
    <div id="tab-leaderboard" class="vm-tab-content" style="display:none">
        <div class="vm-content">
            <div id="vm-leaderboard-content">
                <div class="vm-loading">
                    <div class="vm-spinner"></div>
                    <div>Laster ledertabell...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- AUTH MODAL (Google only) -->
    <div id="vmAuthModal" class="vm-modal-overlay" style="display:none" onclick="if(event.target===this)closeAuthModal()">
        <div class="vm-modal-box">
            <button class="vm-modal-close" onclick="closeAuthModal()">×</button>
            <h2>Logg inn for å tippe</h2>
            <p>Bruk Google-kontoen din for å delta i VM-tippekonkurransen og se ledertabellen.</p>
            <button class="vm-btn-google" id="modalGoogleBtn">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Fortsett med Google
            </button>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- VM 2026 app -->
    <script type="module" src="vm2026.js?v=22"></script>

    <script>
        // closeAuthModal needs to be global (non-module)
        function closeAuthModal() {
            document.getElementById('vmAuthModal').style.display = 'none';
        }

        // Wire modal Google button after module loads
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('modalGoogleBtn').addEventListener('click', () => {
                if (typeof handleGoogleSignIn === 'function') handleGoogleSignIn();
            });
        });
    </script>
</body>
</html>
